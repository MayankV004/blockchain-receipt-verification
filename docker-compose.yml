version: "3.9"
services:
  blockchain:
    build:
      context: .
      dockerfile: Dockerfile.blockchain
    ports:
      - "8001:8001"
    networks:
      - app-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    depends_on:
      - blockchain
    networks:
      - app-net
    volumes:
      - ./local_storage:/app/local_storage

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    networks:
      - app-net

networks:
  app-net:
