services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: receipts
      POSTGRES_PASSWORD: receipts_secret
      POSTGRES_DB: receipts
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks: [app-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receipts"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks: [app-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  blockchain:
    build:
      context: ./blockchain
      dockerfile: ../Dockerfile.blockchain
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8001:8001"
    networks: [app-net]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://receipts:receipts_secret@postgres:5432/receipts
      REDIS_URL: redis://redis:6379
      BLOCKCHAIN_URL: http://blockchain:8001
      FRONTEND_URL: http://frontend:3000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    networks: [app-net]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      blockchain:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    networks: [app-net]
    restart: unless-stopped
    depends_on: [backend]

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks: [app-net]
    restart: unless-stopped
    depends_on: [backend, frontend]

volumes:
  pg_data:
  redis_data:

networks:
  app-net:
    driver: bridge
